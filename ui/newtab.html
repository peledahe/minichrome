<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Pestaña — Mini Browser</title>
    <link rel="stylesheet" href="theme.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="theme.js"></script>
    <style>
        :root {
            --bg: #07070c;
            --accent: #6c5ce7;
            --accent2: #a29bfe;
            --glass: rgba(255,255,255,0.05);
            --glass-border: rgba(255,255,255,0.1);
            --text: #ffffff;
            --text-muted: rgba(255,255,255,0.45);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scrollbar-width: thin; scrollbar-color: rgba(108, 92, 231, 0.35) transparent; }

        ::-webkit-scrollbar { width: 2px; height: 2px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(108, 92, 231, 0.45); border-radius: 999px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(108, 92, 231, 0.8); }
        ::-webkit-scrollbar-corner { background: transparent; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 32px;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 40% at 20% 30%, rgba(108,92,231,0.18) 0%, transparent 70%),
                radial-gradient(ellipse 50% 35% at 80% 70%, rgba(0,184,148,0.10) 0%, transparent 70%),
                radial-gradient(ellipse 40% 30% at 60% 20%, rgba(253,121,168,0.08) 0%, transparent 70%);
            animation: bgPulse 8s ease-in-out infinite alternate;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes bgPulse {
            from { opacity: 0.7; transform: scale(1); }
            to   { opacity: 1;   transform: scale(1.04); }
        }

        body > * { position: relative; z-index: 1; }

        .header { text-align: center; }

        .greeting {
            font-size: 0.85rem;
            font-weight: 300;
            color: var(--text-muted);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .logo-text {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .logo-text img { height: 38px; width: auto; opacity: 0.92; display: block; }
        .logo-text .app-name strong {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #ffffff 0%, #a29bfe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .search-wrap { width: 720px; max-width: 92vw; }

        .search-box {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            padding: 12px 20px;
            backdrop-filter: blur(20px);
            transition: border-color 0.25s, box-shadow 0.25s;
        }

        .search-box:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(108,92,231,0.2);
        }

        .search-box input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            color: var(--text);
        }

        .search-box input::placeholder { color: var(--text-muted); }

        .search-clear-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            color: rgba(255,255,255,0.35);
            display: none;
            align-items: center;
            border-radius: 6px;
            transition: color 0.15s, background 0.15s;
            flex-shrink: 0;
        }
        .search-clear-btn:hover { color: #fff; background: rgba(255,255,255,0.08); }
        .search-clear-btn.visible { display: flex; }

        .search-btn {
            background: var(--accent);
            border: none;
            border-radius: 10px;
            width: 36px; height: 36px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s;
            flex-shrink: 0;
        }
        .search-btn:hover { background: #8075f0; transform: scale(1.06); }
        .search-btn svg { fill: white; }

        .search-engines {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .engine-chip {
            font-size: 0.68rem;
            color: var(--text-muted);
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 999px;
            padding: 0 10px 0 8px;
            height: 22px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
            letter-spacing: 0.01em;
        }
        .engine-chip img {
            width: 12px;
            height: 12px;
            border-radius: 3px;
            object-fit: cover;
            display: block;
            flex-shrink: 0;
        }
        .engine-chip .chip-label { line-height: 1; }
        .engine-chip:hover, .engine-chip.active {
            color: var(--accent2);
            border-color: var(--accent);
            background: rgba(108,92,231,0.12);
        }

        .app-cards { display: flex; gap: 10px; }

        .app-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 7px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 14px 18px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
            min-width: 80px;
            backdrop-filter: blur(16px);
        }

        .app-card:hover {
            transform: translateY(-3px) scale(1.04);
            border-color: var(--accent);
            box-shadow: 0 8px 28px rgba(108,92,231,0.25);
            background: rgba(108,92,231,0.1);
        }

        .app-card .icon-wrap {
            width: 38px; height: 38px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem;
        }

        .app-card .icon-wrap.video   { background: linear-gradient(135deg,#6c5ce7,#a29bfe); }
        .app-card .icon-wrap.agenda  { background: linear-gradient(135deg,#00b894,#00cec9); }
        .app-card .icon-wrap.pagos   { background: linear-gradient(135deg,#fd79a8,#e84393); }
        .app-card .icon-wrap.images  { background: linear-gradient(135deg,#00b894,#55efc4); }
        .app-card .icon-wrap.kanban  { background: linear-gradient(135deg,#fdcb6e,#e17055); }
        .app-card .icon-wrap.notas   { background: linear-gradient(135deg,#74b9ff,#0984e3); }
        .app-card .icon-wrap.ojitos   { background: linear-gradient(135deg,#a29bfe,#6c5ce7); }
        .app-card .icon-wrap.arcade    { background: linear-gradient(135deg,#fd79a8,#e17055); }
        .app-card .icon-wrap.passwords { background: linear-gradient(135deg,#6c5ce7,#00cec9); }

        .app-card span {
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.04em;
        }

        /* Quick links area */
        .quick-links-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            width: 900px;
            max-width: 92vw;
        }

        .quick-links {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            max-height: calc(2 * 24px + 10px); /* 2 filas: 24+6+24 = 54px + margen */
            overflow: hidden;
        }

        .quick-link {
            position: relative;
            display: flex;
            align-items: center;
            gap: 7px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 999px;
            padding: 0 24px 0 10px;
            cursor: pointer;
            text-decoration: none;
            color: var(--text-muted);
            font-size: 0.68rem;
            font-weight: 500;
            letter-spacing: 0.02em;
            transition: all 0.2s;
            height: 24px;
            min-width: 72px;
            max-width: 155px;
        }

        .quick-link:hover {
            color: var(--text);
            border-color: rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.09);
            transform: translateY(-1px);
        }

        .quick-link img {
            width: 12px;
            height: 12px;
            border-radius: 3px;
            object-fit: cover;
            display: block;
            flex-shrink: 0;
        }

        .quick-link > span:not(.ql-delete) {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 110px;
        }

        .quick-link .ql-delete {
            display: none;
            position: absolute;
            top: 50%;
            right: 6px;
            transform: translateY(-50%);
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: rgba(30,30,40,0.95);
            border: 1px solid rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.6);
            font-size: 8px;
            line-height: 1;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
            z-index: 2;
        }

        .quick-link:hover .ql-delete { display: flex; }
        .quick-link .ql-delete:hover { background: rgba(255,59,48,0.85); color: #fff; border-color: transparent; }

        .ql-add-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            border-radius: 8px;
            background: var(--glass);
            border: 1px dashed rgba(255,255,255,0.18);
            color: rgba(255,255,255,0.35);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85rem;
            flex-shrink: 0;
        }
        .ql-add-btn:hover {
            background: rgba(108,92,231,0.15);
            border-color: var(--accent);
            color: var(--accent2);
        }

        /* Modal */
        .ql-modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(6px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .ql-modal-overlay.active { display: flex; }

        .ql-modal {
            background: #14141c;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 18px;
            padding: 28px;
            width: min(380px, 90vw);
            display: flex;
            flex-direction: column;
            gap: 16px;
            box-shadow: 0 24px 64px rgba(0,0,0,0.5);
        }

        .ql-modal h3 {
            font-size: 1rem;
            font-weight: 600;
            color: #fff;
        }

        .ql-modal input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 9px 14px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.88rem;
            color: #fff;
            outline: none;
            transition: border-color 0.2s;
        }
        .ql-modal input:focus { border-color: var(--accent); }
        .ql-modal input::placeholder { color: rgba(255,255,255,0.28); }

        .ql-url-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }
        .ql-url-wrap input { padding-right: 38px; box-sizing: border-box; }
        .ql-paste-btn {
            position: absolute;
            right: 7px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            color: rgba(255,255,255,0.4);
            display: flex;
            align-items: center;
            border-radius: 6px;
            transition: color 0.2s, background 0.2s;
        }
        .ql-paste-btn:hover { color: #fff; background: rgba(255,255,255,0.08); }

        .ql-modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .ql-btn {
            padding: 8px 18px;
            border-radius: 9px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }
        .ql-btn.primary { background: var(--accent); color: #fff; }
        .ql-btn.primary:hover { background: #8075f0; }
        .ql-btn.ghost { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.6); border: 1px solid rgba(255,255,255,0.1); }
        .ql-btn.ghost:hover { background: rgba(255,255,255,0.1); color: #fff; }

        .ql-error {
            font-size: 0.78rem;
            color: #ff6b6b;
            display: none;
        }
        .ql-error.show { display: block; }

        /* Reloj */
        .clock-wrap {
            position: fixed;
            bottom: 86px;
            right: 74px;
            text-align: right;
            opacity: 0.48;
            pointer-events: none;
            z-index: 2;
        }
        .clock-time { font-size: 1.7rem; font-weight: 600; letter-spacing: -0.03em; line-height: 1; }
        .clock-date { font-size: 0.68rem; font-weight: 300; margin-top: 2px; }

        @media (max-width: 760px) {
            .clock-wrap {
                bottom: 92px;
                right: 56px;
                opacity: 0.42;
            }
        }
    </style>
</head>
<body>

    <!-- Encabezado -->
    <div class="header">
        <div class="greeting" id="greeting-text">Bienvenido de vuelta</div>
        <div class="logo-text">
            <img src="favicon.png" alt="Mini Browser">
            <div class="app-name"><strong>Mini Browser</strong></div>
        </div>
    </div>

    <!-- Buscador -->
    <div class="search-wrap">
        <div class="search-box">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="rgba(255,255,255,0.3)">
                <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
            </svg>
            <input type="text" id="search-input" placeholder="Busca en la web o escribe una URL…" autocomplete="off" autofocus>
            <button class="search-clear-btn" id="search-clear-btn" title="Limpiar">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
            <button class="search-btn" id="search-btn" title="Buscar">
                <svg width="16" height="16" viewBox="0 0 24 24">
                    <path d="M2 12l20 0M14 6l6 6-6 6" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                </svg>
            </button>
        </div>
        <div class="search-engines">
            <span class="engine-chip active" data-engine="google">Google</span>
            <span class="engine-chip" data-engine="bing">Bing</span>
            <span class="engine-chip" data-engine="youtube">YouTube</span>
            <span class="engine-chip" data-engine="duckduckgo">DuckDuckGo</span>
            <span class="engine-chip" data-engine="wikipedia">Wikipedia</span>
            <span class="engine-chip" data-engine="reddit">Reddit</span>
            <span class="engine-chip" data-engine="github">GitHub</span>
        </div>
    </div>

    <!-- Accesos a la app -->
    <div class="app-cards">
        <div class="app-card" id="btn-goto-agenda" title="Ir a la Agenda">
            <div class="icon-wrap agenda">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zm-7-9h-2v4h4v-2h-2z"/></svg>
            </div>
            <span>Agenda</span>
        </div>

        <div class="app-card" id="btn-goto-images" title="Ir al Visor de Imágenes">
            <div class="icon-wrap images">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
            </div>
            <span>Imágenes</span>
        </div>

        <div class="app-card" id="btn-goto-viewer" title="Ir al Visor de Videos">
            <div class="icon-wrap video">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
            </div>
            <span>Videos</span>
        </div>

        <div class="app-card" id="btn-goto-passwords" title="Administrar Contraseñas">
            <div class="icon-wrap passwords">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
            </div>
            <span>Claves</span>
        </div>

        <div class="app-card" id="btn-goto-kanban" title="Ir a Kanban">
            <div class="icon-wrap kanban">📋</div>
            <span>Kanban</span>
        </div>

        <div class="app-card" id="btn-goto-notes" title="Ir a Notas">
            <div class="icon-wrap notas">📝</div>
            <span>Notas</span>
        </div>

        <div class="app-card" id="btn-goto-arcade" title="Arcade">
            <div class="icon-wrap arcade">🕹</div>
            <span>Arcade</span>
        </div>
    </div>

    <!-- Accesos rápidos web -->
    <div class="quick-links-wrap">
        <div class="quick-links" id="quick-links-container"></div>
        <button class="ql-add-btn" id="ql-add-btn" title="Agregar acceso rápido">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        </button>
    </div>

    <!-- Modal agregar acceso rápido -->
    <div class="ql-modal-overlay" id="ql-modal">
        <div class="ql-modal">
            <h3>Agregar acceso rápido</h3>
            <input type="text" id="ql-name-input" placeholder="Nombre  (ej: GitHub)">
            <div class="ql-url-wrap">
                <input type="url" id="ql-url-input" placeholder="URL  (ej: https://github.com)">
                <button class="ql-paste-btn" id="ql-paste-btn" title="Pegar">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
                        <rect x="8" y="2" width="8" height="4" rx="1" ry="1"/>
                    </svg>
                </button>
            </div>
            <div class="ql-error" id="ql-error">Ingresa un nombre y una URL válida.</div>
            <div class="ql-modal-actions">
                <button class="ql-btn ghost" id="ql-cancel-btn">Cancelar</button>
                <button class="ql-btn primary" id="ql-save-btn">Agregar</button>
            </div>
        </div>
    </div>

    <!-- Reloj -->
    <div class="clock-wrap">
        <div class="clock-time" id="clock-time">00:00</div>
        <div class="clock-date" id="clock-date"></div>
    </div>

    <script>
        // ---- Reloj ----
        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2,'0');
            const m = String(now.getMinutes()).padStart(2,'0');
            document.getElementById('clock-time').textContent = `${h}:${m}`;
            const dias  = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
            const meses = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
            document.getElementById('clock-date').textContent =
                `${dias[now.getDay()]}, ${now.getDate()} ${meses[now.getMonth()]}`;
        }
        updateClock();
        setInterval(updateClock, 10000);

        // ---- Saludo ----
        const hour = new Date().getHours();
        document.getElementById('greeting-text').textContent =
            hour < 12 ? 'Buenos días' : hour < 19 ? 'Buenas tardes' : 'Buenas noches';

        // ---- Comunicación con el webview padre ----
        function deskioAction(action) { console.log('MERKE_ACTION:' + action); }
        function deskioNavigate(url)  { window.location.href = url; }

        // ---- Quick Links ----
        const MAX_LINKS = 20;

        const DEFAULT_LINKS = [
            { name: 'YouTube', url: 'https://youtube.com' },
            { name: 'GitHub',  url: 'https://github.com' },
            { name: 'ChatGPT', url: 'https://chat.openai.com' },
            { name: 'Gemini',  url: 'https://gemini.google.com' },
            { name: 'Gmail',   url: 'https://gmail.com' },
        ];

        async function loadLinks() {
            // window._miniLinks es inyectado por Python desde quick_links.json
            if (window._miniLinks && Array.isArray(window._miniLinks)) {
                return window._miniLinks;
            }
            return DEFAULT_LINKS;
        }

        async function saveLinks(links) {
            // Enviar al backend Python via consola (WebPage.javaScriptConsoleMessage)
            window._miniLinks = links;
            console.log('MINICHROME_LINKS:' + JSON.stringify(links));
        }

        function domainFromUrl(url) {
            try {
                return new URL(url).hostname.replace(/^www\./i, '');
            } catch {
                return '';
            }
        }

        function faviconCandidatesFromUrl(url) {
            const domain = domainFromUrl(url);
            if (!domain) return [];
            return [
                `https://www.google.com/s2/favicons?sz=64&domain_url=${encodeURIComponent(url)}`,
                `https://www.google.com/s2/favicons?domain=${encodeURIComponent(domain)}&sz=64`,
                `https://icons.duckduckgo.com/ip3/${domain}.ico`,
                `https://${domain}/favicon.ico`,
            ];
        }

        function hashString(value) {
            let hash = 0;
            for (let i = 0; i < value.length; i += 1) {
                hash = ((hash << 5) - hash) + value.charCodeAt(i);
                hash |= 0;
            }
            return Math.abs(hash);
        }

        function createFallbackFavicon(label, seed = '') {
            const palette = ['#6c5ce7', '#00b894', '#0984e3', '#e17055', '#fd79a8', '#00cec9', '#fdcb6e'];
            const safeLabel = (label || '?').trim().charAt(0).toUpperCase() || '?';
            const bg = palette[seed ? hashString(seed) % palette.length : 0];
            const svg = `
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
                    <rect width="32" height="32" rx="8" fill="${bg}"/>
                    <text x="16" y="21" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">${safeLabel}</text>
                </svg>
            `;
            return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
        }

        function setFaviconWithFallback(img, candidates, fallbackLabel = '') {
            if (!img || !candidates.length) {
                if (img) img.style.display = 'none';
                return;
            }

            let idx = 0;
            img.onerror = () => {
                idx += 1;
                if (idx < candidates.length) {
                    img.src = candidates[idx];
                } else {
                    img.onerror = null;
                    img.src = createFallbackFavicon(fallbackLabel, candidates[0] || fallbackLabel);
                }
            };
            img.src = candidates[idx];
        }

        function renderEngineFavicons(root = document) {
            const engineHomeByKey = {
                google: 'https://www.google.com',
                bing: 'https://www.bing.com',
                youtube: 'https://www.youtube.com',
                duckduckgo: 'https://duckduckgo.com',
                wikipedia: 'https://www.wikipedia.org',
                reddit: 'https://www.reddit.com',
                github: 'https://www.github.com',
            };

            root.querySelectorAll('.engine-chip').forEach(chip => {
                if (chip.dataset.hasFavicon === '1') return;

                const key = (chip.dataset.engine || '').toLowerCase();
                const label = chip.textContent.trim();
                const homeUrl = engineHomeByKey[key] || `https://${key}.com`;

                chip.textContent = '';
                const img = document.createElement('img');
                img.alt = '';
                setFaviconWithFallback(img, faviconCandidatesFromUrl(homeUrl), label);

                const text = document.createElement('span');
                text.className = 'chip-label';
                text.textContent = label;

                chip.appendChild(img);
                chip.appendChild(text);
                chip.dataset.hasFavicon = '1';
            });
        }

        async function renderLinks() {
            const links = await loadLinks();
            const container = document.getElementById('quick-links-container');
            container.innerHTML = '';

            links.forEach((link, i) => {
                const a = document.createElement('a');
                a.className = 'quick-link';
                a.href = '#';
                a.dataset.url = link.url;

                const img = document.createElement('img');
                img.alt = '';
                setFaviconWithFallback(img, faviconCandidatesFromUrl(link.url), link.name || domainFromUrl(link.url));

                const label = document.createElement('span');
                label.textContent = link.name;

                const del = document.createElement('span');
                del.className = 'ql-delete';
                del.dataset.index = String(i);
                del.title = 'Eliminar';
                del.textContent = '×';

                a.appendChild(img);
                a.appendChild(label);
                a.appendChild(del);

                a.addEventListener('click', e => {
                    if (e.target.classList.contains('ql-delete')) return;
                    e.preventDefault();
                    deskioNavigate(link.url);
                });

                container.appendChild(a);
            });

            // Mostrar/ocultar botón + según el máximo
            document.getElementById('ql-add-btn').style.display = links.length >= MAX_LINKS ? 'none' : 'flex';

            // Delegación: eliminar
            container.querySelectorAll('.ql-delete').forEach(btn => {
                btn.addEventListener('click', async e => {
                    e.preventDefault();
                    e.stopPropagation();
                    const idx = parseInt(btn.dataset.index);
                    const links = await loadLinks();
                    links.splice(idx, 1);
                    await saveLinks(links);
                    renderLinks();
                });
            });
        }

        renderEngineFavicons();
        const enginesWrap = document.querySelector('.search-engines');
        if (enginesWrap) {
            const enginesObserver = new MutationObserver(() => renderEngineFavicons(enginesWrap));
            enginesObserver.observe(enginesWrap, { childList: true });
        }

        renderLinks();

        // ---- Modal ----
        const modal       = document.getElementById('ql-modal');
        const nameInput   = document.getElementById('ql-name-input');
        const urlInput    = document.getElementById('ql-url-input');
        const errorMsg    = document.getElementById('ql-error');

        document.getElementById('ql-add-btn').addEventListener('click', () => {
            nameInput.value = '';
            urlInput.value  = '';
            errorMsg.classList.remove('show');
            modal.classList.add('active');
            setTimeout(() => nameInput.focus(), 50);
        });

        document.getElementById('ql-cancel-btn').addEventListener('click', () => {
            modal.classList.remove('active');
        });

        modal.addEventListener('click', e => {
            if (e.target === modal) modal.classList.remove('active');
        });

        document.getElementById('ql-save-btn').addEventListener('click', addLink);
        urlInput.addEventListener('keydown', e => { if (e.key === 'Enter') addLink(); });
        nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') urlInput.focus(); });

        document.getElementById('ql-paste-btn').addEventListener('click', async () => {
            try {
                const text = await navigator.clipboard.readText();
                if (text) { urlInput.value = text; urlInput.focus(); }
            } catch (_) {
                urlInput.focus();
                document.execCommand('paste');
            }
        });

        async function addLink() {
            const name = nameInput.value.trim();
            let   url  = urlInput.value.trim();

            if (!name || !url) { errorMsg.classList.add('show'); return; }
            if (!/^https?:\/\//i.test(url)) url = 'https://' + url;

            try { new URL(url); } catch { errorMsg.classList.add('show'); return; }

            const links = await loadLinks();
            if (links.length >= MAX_LINKS) return;

            links.push({ name, url });
            await saveLinks(links);
            renderLinks();
            modal.classList.remove('active');
        }

        // ---- Motores de búsqueda ----
        const engines = {
            google:     q => `https://www.google.com/search?q=${encodeURIComponent(q)}`,
            bing:       q => `https://www.bing.com/search?q=${encodeURIComponent(q)}`,
            youtube:    q => `https://www.youtube.com/results?search_query=${encodeURIComponent(q)}`,
            duckduckgo: q => `https://duckduckgo.com/?q=${encodeURIComponent(q)}`,
            wikipedia:  q => `https://es.wikipedia.org/wiki/Special:Search?search=${encodeURIComponent(q)}`,
            reddit:     q => `https://www.reddit.com/search/?q=${encodeURIComponent(q)}`,
            github:     q => `https://github.com/search?q=${encodeURIComponent(q)}&type=repositories`,
        };
        let activeEngine = 'google';

        document.querySelectorAll('.engine-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                document.querySelectorAll('.engine-chip').forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                activeEngine = chip.dataset.engine;
            });
        });

        function doSearch() {
            const input = document.getElementById('search-input');
            const q = input.value.trim();
            if (!q) return;
            let url;
            if (/^https?:\/\//.test(q) || /^[\w-]+\.[a-z]{2,}/.test(q)) {
                url = /^https?:\/\//.test(q) ? q : 'https://' + q;
            } else {
                url = engines[activeEngine](q);
            }
            input.value = '';
            deskioNavigate(url);
        }

        document.getElementById('search-btn').addEventListener('click', doSearch);
        document.getElementById('search-input').addEventListener('keydown', e => {
            if (e.key === 'Enter') doSearch();
        });

        // Botón limpiar búsqueda
        const searchInput     = document.getElementById('search-input');
        const searchClearBtn  = document.getElementById('search-clear-btn');
        searchInput.addEventListener('input', () => {
            searchClearBtn.classList.toggle('visible', searchInput.value.length > 0);
        });
        searchClearBtn.addEventListener('click', () => {
            searchInput.value = '';
            searchClearBtn.classList.remove('visible');
            searchInput.focus();
        });

        // Limpiar campo al volver via bfcache o reactivación del webview
        window.addEventListener('pageshow', () => {
            searchInput.value = '';
            searchClearBtn.classList.remove('visible');
            searchInput.focus();
        });
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') {
                searchInput.value = '';
                searchClearBtn.classList.remove('visible');
            }
        });

        // ---- Visibilidad de módulos ----
        (async () => {
            try {
                const savedSettings = localStorage.getItem('deskio_app_settings');
                if (savedSettings) {
                    const s = JSON.parse(savedSettings);
                    if (s.videoEnabled === false)   document.getElementById('btn-goto-viewer').style.display = 'none';
                    if (s.imagesEnabled === false)  document.getElementById('btn-goto-images').style.display = 'none';
                    if (s.kanbanEnabled === false)  document.getElementById('btn-goto-kanban').style.display = 'none';
                    if (s.notesEnabled === false)   document.getElementById('btn-goto-notes').style.display = 'none';
                }
            } catch (_) {}
        })();

        function goToAgendaTab(tabName) {
            try {
                localStorage.setItem('lastAgendaTab', tabName);
            } catch (_) {}
            deskioNavigate('agenda.html');
        }

        // ---- Botones de la app ----
        document.getElementById('btn-goto-viewer').addEventListener('click', () => deskioNavigate('videoplayer.html'));
        document.getElementById('btn-goto-agenda').addEventListener('click', () => deskioNavigate('agenda.html'));
        document.getElementById('btn-goto-images').addEventListener('click', () => deskioNavigate('imageplayer.html'));
        document.getElementById('btn-goto-passwords').addEventListener('click', () => deskioNavigate('passwords.html'));
        document.getElementById('btn-goto-kanban').addEventListener('click', () => goToAgendaTab('kanban'));
        document.getElementById('btn-goto-notes').addEventListener('click', () => goToAgendaTab('notes'));
        document.getElementById('btn-goto-arcade').addEventListener('click', () => deskioNavigate('arcade.html'));
    </script>
</body>
</html>
