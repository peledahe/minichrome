<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Contraseñas — Minichrome</title>
    <link rel="stylesheet" href="theme.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
    <style>
        :root {
            --bg: #090911;
            --sidebar-bg: #11111a;
            --accent: #6c5ce7;
            --accent-hover: #8075f0;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.5);
            --danger: #ff5f57;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            padding: 24px;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
        }

        .sidebar-header svg { width: 28px; height: 28px; color: var(--accent); }
        .sidebar-header h1 { font-size: 1.25rem; font-weight: 700; letter-spacing: -0.02em; }

        .search-container {
            margin-bottom: 24px;
            position: relative;
        }

        .search-container input {
            width: 100%;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 10px 14px 10px 36px;
            color: white;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-container input:focus { border-color: var(--accent); }
        .search-container svg {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            width: 16px; height: 16px;
        }

        .nav-items { list-style: none; display: flex; flex-direction: column; gap: 8px; }
        .nav-item {
            padding: 10px 14px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-muted);
            font-weight: 500;
        }
        .nav-item:hover { background: var(--glass); color: white; }
        .nav-item.active { background: rgba(108, 92, 231, 0.15); color: var(--accent); }

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            position: relative;
        }

        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            gap: 14px;
            flex-wrap: wrap;
        }

        .autosave-toggle-wrap {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 8px 12px;
        }

        .autosave-toggle-copy {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .autosave-toggle-copy strong {
            font-size: 0.83rem;
            line-height: 1.2;
        }

        .autosave-toggle-copy small {
            font-size: 0.74rem;
            color: var(--text-muted);
            line-height: 1.2;
        }

        .autosave-policy-select {
            min-width: 180px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: #fff;
            padding: 7px 10px;
            font-family: inherit;
            font-size: 0.82rem;
            outline: none;
        }

        .autosave-policy-select:focus {
            border-color: var(--accent);
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); }

        .password-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .password-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 20px;
            transition: all 0.2s;
            backdrop-filter: blur(10px);
            position: relative;
        }

        .password-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.07);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .site-icon {
            width: 32px; height: 32px;
            border-radius: 8px;
            background: var(--sidebar-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .site-icon img { width: 100%; height: 100%; object-fit: cover; }

        .site-info h3 { font-size: 1rem; font-weight: 600; }
        .site-info p { font-size: 0.85rem; color: var(--text-muted); }
        .type-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-left: 8px;
            padding: 2px 7px;
            border-radius: 999px;
            border: 1px solid var(--glass-border);
            font-size: 0.68rem;
            letter-spacing: 0.04em;
            color: var(--text-muted);
        }

        .field-url {
            font-size: 0.82rem;
            color: var(--text-muted);
            margin-top: -6px;
            margin-bottom: 10px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .field {
            margin-bottom: 12px;
        }
        .field-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
        }
        .field-value-wrap {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.2);
            padding: 8px 12px;
            border-radius: 8px;
        }
        .field-value {
            font-size: 0.9rem;
            font-family: 'Outfit', sans-serif;
            color: white;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
        }
        .field-action {
            cursor: pointer;
            color: var(--text-muted);
            transition: color 0.2s;
            margin-left: 10px;
            display: flex;
            align-items: center;
        }
        .field-action:hover { color: white; }

        .card-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--glass-border);
        }

        .action-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            transition: color 0.2s;
            display: flex;
            align-items: center;
        }
        .action-btn:hover { color: white; }
        .action-btn.delete:hover { color: var(--danger); }

        .ag-input {
            width: 100%;
            background: #1a1a1e;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: #fff;
            padding: 10px 14px;
            font-size: 0.95rem;
            font-family: inherit;
            transition: border-color 0.2s;
        }
        .ag-input:focus { outline: none; border-color: #6c5ce7; }
        .ag-input::placeholder { color: #555; }

        .ag-btn {
            padding: 10px 18px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
            font-family: inherit;
            font-weight: 600;
            transition: all 0.2s;
        }
        .ag-btn-primary { background: #6c5ce7; color: #fff; }
        .ag-btn-primary:hover { background: #5a4dd6; }
        .ag-btn-ghost { background: rgba(255,255,255,0.07); color: #a0a0a8; border: 1px solid rgba(255,255,255,0.12); }
        .ag-btn-ghost:hover { background: rgba(255,255,255,0.12); color: #fff; }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }

        .modal {
            background: var(--sidebar-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            width: 400px;
            padding: 32px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .pw-modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .pw-modal-overlay.active { display: flex; }
        .pw-modal-box {
            background: #18181f;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 16px;
            padding: 24px;
            width: min(480px, 92vw);
            display: flex;
            flex-direction: column;
            gap: 14px;
            box-shadow: 0 24px 60px rgba(0,0,0,0.7);
        }
        .pw-modal-box h2 { font-size: 1rem; font-weight: 700; color: #fff; margin: 0; }

        .pw-type-selector {
            display: flex;
            gap: 6px;
        }
        .pw-type-btn {
            flex: 1;
            padding: 8px;
            border-radius: 9px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.04);
            color: rgba(255,255,255,0.5);
            cursor: pointer;
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.15s;
        }
        .pw-type-btn.active { background: rgba(108,92,231,0.2); border-color: #6c5ce7; color: #a29bfe; }
        .pw-type-btn:hover:not(.active) { background: rgba(255,255,255,0.08); color: #fff; }

        .modal h2 { font-size: 1.25rem; font-weight: 700; }

        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-group label { font-size: 0.85rem; color: var(--text-muted); }
        .form-group input {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 12px;
            color: white;
            outline: none;
            font-family: inherit;
        }
        .form-group select,
        .form-group textarea {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 12px;
            color: white;
            outline: none;
            font-family: inherit;
        }
        .form-group input:focus { border-color: var(--accent); }
        .form-group select:focus,
        .form-group textarea:focus { border-color: var(--accent); }
        .form-group textarea { resize: vertical; min-height: 72px; }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 12px;
        }

        .btn-ghost {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--glass-border);
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
        }
        .btn-ghost:hover { background: var(--glass); color: white; }

        /* Notificación Sticky */
        #notification-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 2000;
        }

        .notification {
            background: #161622;
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 16px;
            width: 300px;
            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Empty State */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 60vh;
            color: var(--text-muted);
            text-align: center;
        }
        .empty-state svg { width: 64px; height: 64px; margin-bottom: 20px; opacity: 0.2; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            <h1>Mis Claves</h1>
        </div>

        <div class="search-container">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <input type="text" id="search-input" placeholder="Buscar sitio...">
        </div>

        <ul class="nav-items">
            <li class="nav-item active">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
                Todas las claves
            </li>
            <li class="nav-item" id="btn-back-home">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"></path></svg>
                Volver
            </li>
        </ul>
    </div>

    <div class="main-content">
        <div class="header-actions">
            <h2>Todas las claves</h2>
            <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
                <div class="autosave-toggle-wrap" title="Solo aplica al guardado detectado automáticamente en sitios web">
                    <div class="autosave-toggle-copy">
                        <strong>Autoguardado en navegador</strong>
                        <small>Manual siempre permitido</small>
                    </div>
                    <select id="pw-autosave-policy" class="autosave-policy-select" aria-label="Modo de autoguardado en navegador">
                        <option value="ask">Preguntar antes de guardar</option>
                        <option value="always">Guardar siempre sin preguntar</option>
                        <option value="never">Nunca guardar automaticamente</option>
                    </select>
                </div>
                <button class="btn-primary" id="btn-add-pwd">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    Nueva Clave
                </button>
            </div>
        </div>

        <div id="password-list" class="password-grid">
            <!-- Cargando... -->
        </div>
    </div>

    <!-- Modal Agregar/Editar -->
    <div class="modal-overlay pw-modal-overlay" id="pwd-modal">
        <div class="modal pw-modal-box">
            <h2 id="modal-title">Agregar Clave</h2>
            <div class="pw-type-selector">
                <button type="button" class="pw-type-btn active" data-type="web">Sitio Web</button>
                <button type="button" class="pw-type-btn" data-type="app">Aplicación</button>
            </div>
            <div class="form-group">
                <label id="input-site-label">Sitio Web</label>
                <input type="text" id="input-site" class="ag-input" placeholder="ej: google.com">
            </div>
            <div class="form-group" id="input-url-row">
                <label>URL</label>
                <input type="text" id="input-url" class="ag-input" placeholder="https://...">
            </div>
            <div class="form-group">
                <label>Usuario / Email</label>
                <input type="text" id="input-user" class="ag-input" placeholder="ej: usuario@gmail.com">
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="input-pass" class="ag-input" placeholder="••••••••">
            </div>
            <div class="form-group">
                <label>Notas</label>
                <textarea id="input-notes" class="ag-input" placeholder="Notas opcionales..."></textarea>
            </div>
            <div class="modal-footer">
                <button class="ag-btn ag-btn-ghost" id="btn-modal-cancel">Cancelar</button>
                <button class="ag-btn ag-btn-primary" id="btn-modal-save">Guardar</button>
            </div>
        </div>
    </div>

    <!-- Modal Confirmación Borrar -->
    <div class="modal-overlay pw-modal-overlay" id="confirm-modal">
        <div class="modal pw-modal-box" style="width: min(350px, 92vw); text-align: center;">
            <div style="color: var(--danger); margin-bottom: 16px;">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
            </div>
            <h2>¿Estás seguro?</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: 8px;">Esta acción no se puede deshacer.</p>
            <div class="modal-footer" style="justify-content: center; margin-top: 24px;">
                <button class="ag-btn ag-btn-ghost" id="btn-confirm-cancel">Cancelar</button>
                <button class="ag-btn ag-btn-primary" style="background: var(--danger);" id="btn-confirm-ok">Borrar</button>
            </div>
        </div>
    </div>

    <div id="notification-container"></div>

    <script src="theme.js"></script>
    <script src="passwords.js"></script>
</body>
</html>
